# Akamai Styleguide — Contractions
# Source: Akamai/Contractions.yml
# The Akamai style guide encourages contractions in general writing.
# See also: AkamaiContractions.yml for the exception (don't use contractions with "Akamai").

extends: substitution
message: "Use '%s' instead of '%s'."
link: https://collaborate.akamai.com/confluence/display/TCSG/C#C-contractions
level: error
nonword: true

ignorecase: true
action:
  name: replace
swap:
  are not: aren't
  cannot: can't
  could not: couldn't
  did not: didn't
  do not: don't
  does not: doesn't
  has not: hasn't
  have not: haven't
  how is: how's
  is not: isn't
  it is: it's
  should not: shouldn't
  that is: that's
  they are: they're
  was not: wasn't
  we are: we're
  we have: we've
  were not: weren't
  what is: what's
  when is: when's
  where is: where's
  will not: won't

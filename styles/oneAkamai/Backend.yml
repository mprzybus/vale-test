extends: substitution
message: "Use '%s' instead of '%s'."
level: warning
nonword: true

link: https://collaborate.akamai.com/confluence/display/TCSG/B#B-backend(n),back-end(adj)
# Use 'back end' (noun) or 'back-end' (adj).
pos: 'back-end/NN|backend/(?:JJ|NN)|back/\w+ end/JJ|back/(?:JJ|RB) end/\w+'
ignorecase: true
action:
  name: replace
swap:
  back-end: back end
  back end: back-end

extends: substitution
message: "Use '%s' instead of '%s'."
link: https://collaborate.akamai.com/confluence/display/TCSG/F#F-forexample,suchas
ignorecase: true
level: error
nonword: true

action:
  name: replace
swap:
  '\b(?:eg|e\.g\.)[\s,]': for example
  '\b(?:ie|i\.e\.)[\s,]': that is
  '\b(?:such is)[\s,]': such is

